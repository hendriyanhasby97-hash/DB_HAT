<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mandiri Pegawai (DRH & Layanan)</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        // 🔒 PROTEKSI: Hanya izinkan pengguna dengan role pegawai saja
        checkAuth(['pegawai']);
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #0284c7;
            --primary-dark: #0369a1;
            --primary-light: #f0f9ff;
            --dark-slate: #0f172a;
            --sidebar-bg: #1e293b;
            --bg-light: #f8fafc;
            --text-main: #334155;
            --border-color: #e2e8f0;
        }

        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background: var(--bg-light); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* Sidebar Pegawai */
        .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .profile-box { padding: 25px 20px; text-align: center; border-bottom: 1px solid #334155; background: #111827; }
        .profile-box i { font-size: 36px; color: var(--primary); margin-bottom: 10px; }
        .profile-box h4 { font-size: 14px; font-weight: 700; color: #f8fafc; }
        .profile-box p { font-size: 11px; color: #94a3b8; margin-top: 2px; }

        .nav-menu { flex: 1; padding: 15px 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 15px; color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 600; border-radius: 8px; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: var(--primary); color: white; }

        .btn-logout { margin-top: auto; padding: 15px 20px; background: #111827; color: #f43f5e; font-size: 13px; font-weight: 700; border-top: 1px solid #334155; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout:hover { background: #e11d48; color: white; }

        /* Area Kerja / Konten */
        .content-area { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .topbar { background: white; height: 60px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .topbar h2 { font-size: 16px; font-weight: 700; color: var(--dark-slate); }
        
        .iframe-container { flex: 1; background: #f1f5f9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-box">
            <i class="fa-solid fa-circle-user"></i>
            <h4 id="user-display-name">Pegawai Mandiri</h4>
            <p id="user-display-role">Hak Akses: Portal Pegawai</p>
        </div>

        <div class="nav-menu">
            <a href="#" class="nav-item active" onclick="switchFrame('dashboard.html', this)">
                <i class="fa-solid fa-gauge"></i> Dashboard Anda
            </a>
            <a href="#" class="nav-item" onclick="switchFrame('data-keluarga.html', this)">
                <i class="fa-solid fa-users-rectangle"></i> Data Keluarga
            </a>
            <a href="#" class="nav-item" onclick="switchFrame('berkas-str.html', this)">
                <i class="fa-solid fa-id-card-clip"></i> Unggah STR
            </a>
            <a href="#" class="nav-item" onclick="switchFrame('berkas-sik.html', this)">
                <i class="fa-solid fa-file-signature"></i> Unggah SIK
            </a>
        </div>

        <div class="btn-logout" onclick="logoutUser()">
            Keluar Akun <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </div>
    </div>

    <div class="content-area">
        <div class="topbar">
            <h2 id="page-title-header">Dashboard Anda</h2>
            <div style="font-size: 12px; color: #64748b;" id="info-login-time">
                <i class="fa-solid fa-clock"></i> Sesi Aktif Karyawan
            </div>
        </div>
        <div class="iframe-container">
            <iframe id="content-frame" src="dashboard.html"></iframe>
        </div>
    </div>

    <script>
        // Mengambil ID pegawai yang tersimpan di Session Storage hasil login
        const userKeyGlobal = sessionStorage.getItem('user_key');

        document.addEventListener('DOMContentLoaded', () => {
            // Mengambil profil singkat karyawan dari Supabase jika dibutuhkan untuk ditaruh di sidebar header
            fetchKaryawanProfile();
        });

        async function fetchKaryawanProfile() {
            if (!userKeyGlobal || userKeyGlobal === 'SUPER-ADMIN-KEY' || userKeyGlobal === 'ADMIN-READ-ONLY') return;
            
            try {
                // Menggunakan object 'supabase' terpusat dari auth.js
                const { data, error } = await supabase
                    .from('pegawai')
                    .select('nama, nik')
                    .eq('id_pegawai', userKeyGlobal)
                    .maybeSingle();

                if (data) {
                    document.getElementById('user-display-name').innerText = data.nama;
                    document.getElementById('user-display-role').innerText = `NIK: ${data.nik}`;
                }
            } catch (err) {
                console.error("Gagal memuat info profil sidebar:", err);
            }
        }

        function switchFrame(url, element) {
            document.getElementById('content-frame').src = url;
            
            // Perbarui visual aktif pada menu link
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Perbarui judul topbar
            document.getElementById('page-title-header').innerText = element.textContent.trim();
        }
    </script>
</body>
</html>
