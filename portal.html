<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pegawai - HRIS</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: #334155; height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR MODERN */
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #1e293b;}
        .sidebar.collapsed { width: 76px; }
        .sidebar.collapsed .nav-text, .sidebar.collapsed .arrow-icon { display: none !important; }
        .sidebar.collapsed .sidebar-header h2 { font-size: 1.1rem; }
        .sidebar.collapsed .submenu { display: none !important; }
        
        .sidebar-header { padding: 24px 20px; text-align: center; border-bottom: 1px solid #1e293b; white-space: nowrap;}
        .sidebar-header h2 { font-size: 1.4rem; color: #10b981; margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; letter-spacing: -0.025em; }
        
        .nav-menu { list-style: none; padding: 20px 0; flex-grow: 1; overflow-y: auto; overflow-x: hidden; }
        .nav-item { padding: 12px 20px; margin: 4px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.2s ease; font-size: 0.95rem; font-weight: 500; color: #cbd5e1; white-space: nowrap;}
        .nav-item i:first-child { min-width: 22px; text-align: center; font-size: 1.2rem; }
        .nav-item:hover { background-color: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background-color: rgba(16, 185, 129, 0.1); color: #10b981; }
        
        .has-dropdown { justify-content: space-between; }
        .nav-text { display: flex; justify-content: space-between; width: 100%; align-items: center;}
        .arrow-icon { font-size: 0.75rem; transition: transform 0.3s ease; opacity: 0.7; }
        .has-dropdown.open .arrow-icon { transform: rotate(180deg); opacity: 1; }
        
        .submenu { list-style: none; padding: 8px 0; margin: 0 12px 8px 24px; border-left: 1px solid #334155; display: none; flex-direction: column; }
        .submenu.show { display: flex; }
        .submenu-item { padding: 10px 15px 10px 20px; margin: 2px 0 2px 10px; cursor: pointer; color: #94a3b8; font-size: 0.875rem; display: flex; align-items: center; gap: 12px; transition: all 0.2s ease; border-radius: 6px; white-space: nowrap; font-weight: 500;}
        .submenu-item:hover { color: white; background-color: rgba(255,255,255,0.05); }
        .submenu-item.active { color: #10b981; background-color: transparent; }

        .sidebar-footer { padding: 20px; border-top: 1px solid #1e293b; display: flex; flex-direction: column; background-color: #0f172a; gap: 12px;}
        .btn-logout { background: #ef4444; color: white; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; white-space: nowrap;}
        .btn-logout:hover { background: #dc2626; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); }

        /* MAIN CONTENT & TOPBAR */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; background-color: #f8fafc; }
        .topbar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 16px 32px; border-bottom: 1px solid #e2e8f0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .topbar-left { display: flex; align-items: center; gap: 24px; }
        .btn-toggle-sidebar { background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1.1rem; color: #475569; cursor: pointer; padding: 8px 12px; transition: all 0.2s; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);}
        .btn-toggle-sidebar:hover { color: #10b981; border-color: #cbd5e1; background: #f8fafc; }
        .topbar h2 { font-size: 1.25rem; color: #0f172a; margin: 0; font-weight: 700; letter-spacing: -0.025em; text-transform: uppercase;}
        .user-profile-badge { display: flex; align-items: center; gap: 12px; font-size: 0.875rem; color: #475569; font-weight: 600; background: white; padding: 6px 14px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);}
        
        #app-content { padding: 32px; overflow-y: auto; flex: 1; }
    </style>
</head>
<body>

    <div class="sidebar" id="appSidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-user-circle"></i> <span class="nav-text">Portal Pegawai</span></h2>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item active" onclick="loadPage('profil', this)"><i class="fas fa-id-badge"></i> <span class="nav-text">Profil Saya</span></li>
            
            <div id="menu-perizinan">
                <li class="nav-item has-dropdown" onclick="toggleMenu('submenu-perizinan', this)">
                    <i class="fas fa-file-medical"></i> 
                    <span class="nav-text">Berkas Perizinan <i class="fas fa-chevron-down arrow-icon"></i></span>
                </li>
                <ul class="submenu" id="submenu-perizinan">
                    <li class="submenu-item" onclick="loadPage('sik', this)"><i class="fas fa-circle" style="font-size: 5px;"></i> SIK / SIP</li>
                    <li class="submenu-item" onclick="loadPage('str', this)"><i class="fas fa-circle" style="font-size: 5px;"></i> STR</li>
                </ul>
            </div>

            <li class="nav-item" onclick="loadPage('sertifikat', this)"><i class="fas fa-certificate"></i> <span class="nav-text">Sertifikat Pegawai</span></li>
            
            <li class="nav-item" id="menu-skp" onclick="loadPage('skp', this)"><i class="fas fa-file-signature"></i> <span class="nav-text">Sasaran Kinerja (SKP)</span></li>
        </ul>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnUserLogout"><i class="fas fa-sign-out-alt"></i> <span class="nav-text">Keluar Aplikasi</span></button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="topbar">
            <div class="topbar-left">
                <button class="btn-toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h2 id="page-title">Memuat...</h2>
            </div>
            <div class="user-profile-badge">
                <span id="badge-nama"><i class="fas fa-circle-notch fa-spin"></i> Menyiapkan Data...</span>
            </div>
        </div>
        
        <div id="app-content"></div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('appSidebar');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                document.querySelectorAll('.submenu').forEach(el => el.classList.remove('show'));
                document.querySelectorAll('.has-dropdown').forEach(el => el.classList.remove('open'));
            }
        }
        function toggleMenu(menuId, element) {
            const sidebar = document.getElementById('appSidebar');
            if (sidebar.classList.contains('collapsed')) sidebar.classList.remove('collapsed'); 
            const submenu = document.getElementById(menuId);
            submenu.classList.toggle('show');
            if (element.classList.contains('has-dropdown')) element.classList.toggle('open');
        }
    </script>
    <script type="module" src="./js/portal.js"></script>

</body>
</html>
