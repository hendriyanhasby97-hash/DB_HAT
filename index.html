<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendataan Pegawai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* CSS Tambahan untuk memastikan Tab berfungsi meskipun Tailwind gagal load */
        .tab-content { display: none; }
        .tab-content.active { display: grid; }
        .hidden { display: none !important; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        
        .tab-btn.active {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
            font-weight: bold;
        }
        /* Memastikan tabel tidak tumpang tindih */
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e2e8f0; padding: 8px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold">Data Pegawai RS</h1>
                <p class="text-slate-500 text-sm">Kelola informasi SDM dengan mudah</p>
            </div>
            <button id="btn-toggle-form" class="mt-4 md:mt-0 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all">
                + Tambah Pegawai
            </button>
        </header>

        <div id="form-container" class="hidden bg-white rounded-2xl shadow-lg border border-slate-200 mb-8 overflow-hidden animate-fadeIn">
            <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                <h2 id="form-title" class="font-bold text-lg text-slate-700">Form Input Pegawai</h2>
                <span id="mode-badge" class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded">Mode: Tambah Baru</span>
            </div>

            <div class="flex border-b border-slate-200 px-6 bg-white overflow-x-auto">
                <button class="tab-btn active py-4 px-6 text-sm whitespace-nowrap" data-tab="pribadi">Data Pribadi</button>
                <button class="tab-btn py-4 px-6 text-sm whitespace-nowrap" data-tab="pekerjaan">Data Pekerjaan</button>
                <button class="tab-btn py-4 px-6 text-sm whitespace-nowrap" data-tab="pendidikan">Data Pendidikan</button>
                <button class="tab-btn py-4 px-6 text-sm whitespace-nowrap" data-tab="keluarga">Keluarga & Kontak</button>
            </div>

            <form id="pegawai-form" class="p-8">
                <input type="hidden" id="id_pegawai">

                <div id="pribadi" class="tab-content active grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">NIK</label><input type="number" id="nik" class="w-full border rounded-lg p-2 bg-slate-50" required></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Nama</label><input type="text" id="nama" class="w-full border rounded-lg p-2 bg-slate-50" required></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Jenis Kelamin</label>
                        <select id="jenis_kelamin" class="w-full border rounded-lg p-2 bg-slate-50"><option>Laki-laki</option><option>Perempuan</option></select>
                    </div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Agama</label>
                        <select id="agama" class="w-full border rounded-lg p-2 bg-slate-50"><option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Buddha</option></select>
                    </div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Tempat Lahir</label><input type="text" id="tempat_lahir" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Tanggal Lahir</label><input type="date" id="tanggal_lahir" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                </div>

                <div id="pekerjaan" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">NIP</label><input type="number" id="nip" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Status</label>
                        <select id="status" class="w-full border rounded-lg p-2 bg-slate-50"><option>PNS</option><option>PPPK</option><option>Kontrak</option><option>Tetap RS</option></select>
                    </div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Jabatan</label><input type="text" id="jabatan" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Ruangan</label><input type="text" id="ruangan" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Golongan</label><input type="text" id="gol" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">TMT Pangkat</label><input type="date" id="tmt_pangkat" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">TMT Berikutnya</label><input type="date" id="tmt_berikutnya" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Rentang BUP</label><input type="number" id="rentang_bup" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">TMT Pensiun</label><input type="date" id="tmt_pensiun" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">TMT CPNS</label><input type="date" id="tmt_cpns" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Masuk RS</label><input type="date" id="masuk_rs" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Masa Kerja RS</label><input type="text" id="masa_kerja_rs" class="w-full border rounded-lg p-2 bg-slate-200" readonly></div>
                </div>

                <div id="pendidikan" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Jenjang</label>
                        <select id="jenjang" class="w-full border rounded-lg p-2 bg-slate-50"><option>D3</option><option>D4</option><option>S1</option><option>S2</option><option>Profesi</option></select>
                    </div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Fakultas</label><input type="text" id="fakultas" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Jurusan</label><input type="text" id="jurusan" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                </div>

                <div id="keluarga" class="tab-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Status Keluarga</label>
                        <select id="status_keluarga" class="w-full border rounded-lg p-2 bg-slate-50"><option>TK</option><option>K/0</option><option>K/1</option><option>K/2</option><option>K/3</option></select>
                    </div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Alamat</label><input type="text" id="alamat" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">BPJS Kes</label><input type="number" id="no_bpjsn" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">BPJS Ket / Taspen</label><input type="text" id="no_bpjsket_taspen" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">NPWP</label><input type="text" id="npwp" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Email</label><input type="email" id="email" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                    <div><label class="block text-xs font-bold mb-1 uppercase text-slate-500">Telepon</label><input type="tel" id="no_telp" class="w-full border rounded-lg p-2 bg-slate-50"></div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-200 flex justify-end gap-3">
                    <button type="button" id="btn-batal" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2 rounded-xl transition-all">Tutup</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-xl font-bold transition-all">Simpan Data</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <h3 class="font-bold text-lg">Daftar Pegawai</h3>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="cari-pegawai" placeholder="Cari NIK/Nama..." class="border rounded-lg px-4 py-2 text-sm w-full md:w-64">
                    <button onclick="eksporExcel()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm">Excel</button>
                    <button onclick="eksporPDF()" class="bg-rose-600 text-white px-4 py-2 rounded-lg text-sm">PDF</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-slate-800 text-white">
                            <th class="p-4">NIK</th>
                            <th class="p-4">Nama</th>
                            <th class="p-4">Jabatan</th>
                            <th class="p-4">Masuk RS</th>
                            <th class="p-4">Ruangan</th>
                            <th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-pegawai-body" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-4xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-slate-800">Detail Lengkap Pegawai</h2>
                <button onclick="tutupModal()" class="text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
            </div>
            <div id="detail-content" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
            <div class="mt-8 pt-6 border-t flex justify-end">
                <button onclick="tutupModal()" class="bg-slate-800 text-white px-8 py-2 rounded-xl font-bold">Selesai</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
