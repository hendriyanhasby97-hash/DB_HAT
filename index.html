<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppInstan HRIS | Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                div class="sidebar-header">
    <img src="HRIS.png" alt="Logo" style="width: 30px; height: 30px; border-radius: 4px;">
    <span>AppInstan HRIS</span>
</div>
            </div>
            <ul class="menu-list">
                <li><a href="#"><i class="fa-solid fa-user-shield"></i> <span>Admin</span></a></li>
                <li><a href="#"><i class="fa-solid fa-database"></i> <span>Management Information</span></a></li>
                <li><a href="#"><i class="fa-solid fa-wallet"></i> <span>Financial Center</span></a></li>
                <li><a href="#"><i class="fa-solid fa-clock-rotate-left"></i> <span>History</span></a></li>
                <li><a href="#"><i class="fa-solid fa-user"></i> <span>My Info</span></a></li>
                <li><a href="#"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button id="toggleBtn" class="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                
                <div class="user-profile" id="userMenu">
                    <div class="profile-trigger" onclick="toggleDropdown()">
                        <span>Halo, Hasby</span>
                        <img src="https://ui-avatars.com/api/?name=Hasby" alt="Avatar">
                    </div>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="#" onclick="handleChangePassword()"><i class="fa-solid fa-key"></i> Ganti Password</a>
                        <a href="#" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
                    </div>
                </div>
            </header>

            <section class="content-area">
                <h1>Dashboard</h1>
                <p>Selamat datang, Hasby. Sistem siap digunakan.</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
