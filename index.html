<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinergi Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        // 🔒 PROTEKSI: Hanya izinkan superadmin & admin masuk ke halaman ini
        checkAuth(['superadmin', 'admin']);
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: #f1f5f9; overflow: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: 280px; background: #0f172a; color: white; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 25px; font-weight: 800; font-size: 20px; color: #38bdf8; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1e293b; }
        
        /* Dropdown & Menu Styling */
        .menu-label { padding: 15px 25px 5px 25px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .dropdown-btn { padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #94a3b8; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .dropdown-btn:hover { color: white; background: #1e293b; }
        .dropdown-container { background: #0b1329; display: none; padding-left: 10px; }
        .dropdown-container a { padding: 10px 25px; display: flex; align-items: center; gap: 12px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; border-radius: 6px; margin: 2px 15px; }
        .dropdown-container a:hover { color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
        .dropdown-container a i { width: 16px; text-align: center; }
        
        .active-link { color: white !important; background: #2563eb !important; }
        
        /* Main Content Styling */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; background: #f8fafc; }
        
        .btn-logout { margin-top: auto; padding: 15px 25px; background: #1e293b; color: #ef4444; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-top: 1px solid #334155; }
        .btn-logout:hover { background: #fc8181; color: #7f1d1d; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-square-poll-horizontal"></i>
            <span>SINERGI ADMIN</span>
        </div>

        <div class="menu-label">Utama</div>
        <div class="dropdown-btn" onclick="loadPage('dashboard.html')">Dashboard Utama <i class="fa-solid fa-chart-pie"></i></div>

        <div class="menu-label">Master Data</div>
        <div class="dropdown-btn" onclick="toggleMenu(this)">Manajemen Pegawai <i class="fa-solid fa-chevron-down"></i></div>
        <div class="dropdown-container" style="display: block;">
            <a href="#" class="active-link" onclick="loadPage('daftar-pegawai.html', this)"><i class="fa-solid fa-users"></i> Daftar Pegawai</a>
        </div>

        <div class="menu-label">Validasi Berkas</div>
        <div class="dropdown-btn" onclick="toggleMenu(this)">Arsip Dokumen <i class="fa-solid fa-chevron-down"></i></div>
        <div class="dropdown-container">
            <a href="#" onclick="loadPage('berkas-str.html', this)"><i class="fa-solid fa-id-card"></i> Berkas STR</a>
            <a href="#" onclick="loadPage('berkas-sik.html', this)"><i class="fa-solid fa-file-contract"></i> Berkas SIK</a>
        </div>

        <div class="menu-label">Kualifikasi</div>
        <div class="dropdown-btn" onclick="toggleMenu(this)">Riwayat Hidup <i class="fa-solid fa-chevron-down"></i></div>
        <div class="dropdown-container">
            <a href="#" onclick="loadPage('riwayat-pangkat.html', this)"><i class="fa-solid fa-star"></i> Riwayat Pangkat</a>
            <a href="#" onclick="loadPage('riwayat-jabatan.html', this)"><i class="fa-solid fa-briefcase"></i> Riwayat Jabatan</a>
            <a href="#" onclick="loadPage('riwayat-pendidikan.html', this)"><i class="fa-solid fa-graduation-cap"></i> Riwayat Pendidikan</a>
            <a href="#" onclick="loadPage('data-keluarga.html', this)"><i class="fa-solid fa-people-roof"></i> Data Keluarga</a>
        </div>

        <div class="btn-logout" onclick="logoutUser()">
            Keluar Sistem <i class="fa-solid fa-power-off"></i>
        </div>
    </div>

    <div class="main">
        <iframe id="frame" src="dashboard.html"></iframe>
    </div>

    <script>
        function toggleMenu(el) {
            let container = el.nextElementSibling;
            const icon = el.querySelector('i');
            
            if (container.style.display === "block") {
                container.style.display = "none";
                if(icon.classList.contains('fa-chevron-down')) icon.className = 'fa-solid fa-chevron-right';
            } else {
                container.style.display = "block";
                if(icon.classList.contains('fa-chevron-right')) icon.className = 'fa-solid fa-chevron-down';
            }
        }

        function loadPage(url, element = null) {
            document.getElementById('frame').src = url;
            
            if(element) {
                document.querySelectorAll('.dropdown-container a').forEach(a => a.classList.remove('active-link'));
                element.classList.add('active-link');
            }
        }
    </script>
</body>
</html>
