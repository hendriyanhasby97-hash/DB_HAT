<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppInstan HRIS Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-briefcase"></i> <span>AppInstan HRIS</span>
            </div>
            <ul class="menu-list">
                <li><a href="#"><i class="fa-solid fa-user-shield"></i> <span>Admin</span></a></li>
                <li><a href="#"><i class="fa-solid fa-chart-line"></i> <span>Management Information Center</span></a></li>
                <li><a href="#"><i class="fa-solid fa-wallet"></i> <span>Financial Center</span></a></li>
                <li><a href="#"><i class="fa-solid fa-clock-rotate-left"></i> <span>History</span></a></li>
                <li><a href="#"><i class="fa-solid fa-user"></i> <span>My Info</span></a></li>
                <li><a href="#"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button id="toggleBtn" class="toggle-btn"><i class="fa-solid fa-bars"></i></button>
                <div class="user-profile">
                    <span>Halo, Hasby</span>
                    <img src="https://ui-avatars.com/api/?name=Hasby" alt="Avatar">
                </div>
            </header>

            <section class="content-area">
                <h1>Dashboard HRIS</h1>
                <p>Selamat datang kembali. Silakan kelola data pegawai Anda di bawah ini.</p>
                </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
